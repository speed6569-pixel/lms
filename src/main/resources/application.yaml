spring:
  config:
    import: optional:file:./config/local-secrets.yaml

  application:
    name: lms

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

  datasource:
    url: ${DB_URL:${APP_DB_URL:jdbc:mysql://172.27.192.1:3306/lms_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}}
    username: ${DB_USERNAME:${APP_DB_USERNAME:}}
    password: ${DB_PASSWORD:${APP_DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    host: ${MAIL_HOST:${APP_MAIL_HOST:smtp.gmail.com}}
    port: ${MAIL_PORT:${APP_MAIL_PORT:587}}
    username: ${MAIL_USERNAME:${APP_MAIL_USERNAME:}}
    password: ${MAIL_PASSWORD:${APP_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

mail:
  from: ${MAIL_FROM:${APP_MAIL_FROM:${MAIL_USERNAME:no-reply@localhost}}}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: 300m

logging:
  level:
    org.springframework.jdbc.core: ${LOG_JDBC_LEVEL:INFO}
    org.springframework.security: ${LOG_SECURITY_LEVEL:INFO}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
