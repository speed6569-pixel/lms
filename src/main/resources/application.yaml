spring:
  application:
    name: lms

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3308}/${DB_NAME:lms_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:lms_user}
    password: ${DB_PASSWORD:LmsUser!2026#}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA는 테이블/매핑 검증용으로만 사용
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

mail:
  from: ${MAIL_FROM:no-reply@lms.local}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.jdbc.core: DEBUG
    org.springframework.security: INFO
