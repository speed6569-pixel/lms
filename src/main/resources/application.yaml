spring:
  application:
    name: lms

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3308/lms_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

mail:
  from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@localhost}}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: 300m

logging:
  level:
    org.springframework.jdbc.core: ${LOG_JDBC_LEVEL:INFO}
    org.springframework.security: ${LOG_SECURITY_LEVEL:INFO}
