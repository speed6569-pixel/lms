<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제내역</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <script defer th:src="@{/js/header-profile.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>

<main class="container section-block" style="padding-top: 28px;">

    <div class="card" style="padding: 18px; overflow-x: auto;">
        <table style="width:100%; border-collapse: collapse; min-width: 640px;">
            <thead>
            <tr style="text-align:left; border-bottom:1px solid #e5e7eb;">
                <th style="padding:10px 8px;">일자</th>
                <th style="padding:10px 8px;">항목</th>
                <th style="padding:10px 8px;">결재수단</th>
                <th style="padding:10px 8px;">상태</th>
                <th style="padding:10px 8px; text-align:right;">금액</th>
            </tr>
            </thead>
            <tbody>
            <tr style="border-bottom:1px solid #f1f5f9;">
                <td style="padding:10px 8px;">2026-02-21</td>
                <td style="padding:10px 8px;">스프링부트 실전</td>
                <td style="padding:10px 8px;">카드</td>
                <td style="padding:10px 8px; color:#0f766e;">완료</td>
                <td style="padding:10px 8px; text-align:right;">₩120,000</td>
            </tr>
            <tr style="border-bottom:1px solid #f1f5f9;">
                <td style="padding:10px 8px;">2026-02-03</td>
                <td style="padding:10px 8px;">SQL 마스터 클래스</td>
                <td style="padding:10px 8px;">무통장입금</td>
                <td style="padding:10px 8px; color:#0f766e;">완료</td>
                <td style="padding:10px 8px; text-align:right;">₩95,000</td>
            </tr>
            <tr>
                <td style="padding:10px 8px;">2026-01-25</td>
                <td style="padding:10px 8px;">자바 기초 완성</td>
                <td style="padding:10px 8px;">카드</td>
                <td style="padding:10px 8px; color:#b45309;">취소</td>
                <td style="padding:10px 8px; text-align:right;">₩80,000</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
