<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육일정</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <script defer th:src="@{/js/header-profile.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>


<main class="container content-wrap">
    <div class="search-row"><input id="pageSearchInput" type="text" placeholder="교육일정 검색"><button id="pageSearchBtn" type="button">검색</button></div>
    <section class="post-list" id="searchContainer">
        <article class="post-card search-item"><h3>[교육일정] 3월 1주차</h3><p>신규 과정 오픈 및 오리엔테이션이 진행됩니다.</p></article>
        <article class="post-card search-item"><h3>[교육일정] 3월 2주차</h3><p>실시간 특강과 질의응답 세션이 예정되어 있습니다.</p></article>
        <article class="post-card search-item"><h3>[교육일정] 3월 3주차</h3><p>중간 점검과 진도 리포트 발행이 진행됩니다.</p></article>
    </section>
</main>
<script>
(function(){
  const input = document.getElementById('pageSearchInput');
  const btn = document.getElementById('pageSearchBtn');
  const rows = Array.from(document.querySelectorAll('.search-item'));
  function run(){
    const q = (input.value||'').trim().toLowerCase();
    rows.forEach(r=>{ r.style.display = !q || r.textContent.toLowerCase().includes(q) ? '' : 'none'; });
  }
  btn.addEventListener('click', run);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();run();} });
})();
</script>
</body>
</html>
