<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의 시청</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <script defer th:src="@{/js/header-profile.js}"></script>
    <style>
        .learn-wrap{max-width:1200px;margin:20px auto;padding:0 16px;display:grid;grid-template-columns:2fr 1fr;gap:14px}
        .box{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px}
        .lesson-item{border:1px solid #e5e7eb;border-radius:10px;padding:10px;cursor:pointer;margin-bottom:8px}
        .lesson-item.active{border-color:#2563eb;background:#eff6ff}
        .thumb{width:60px;height:40px;background:#e5e7eb;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px}
        .li-row{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}
        .lesson-main{display:flex;gap:10px;flex:1}
        .done-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#16a34a;color:#fff;font-size:12px;font-weight:700}
        .nav-row{display:flex;gap:8px;justify-content:space-between;margin-top:10px}
        .action{border:0;background:#2563eb;color:#fff;border-radius:8px;padding:8px 12px;cursor:pointer}
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>

<main class="learn-wrap">
    <section class="box">
        <h2 th:text="|${courseName} (${courseCode})|"></h2>
        <video id="player" controls style="width:100%;max-height:520px;background:#000;"></video>
        <div style="margin-top:10px;">
            <a href="/mypage?tab=ongoing" class="action" style="text-decoration:none;display:inline-block;">나의 수강 현황(마이페이지)</a>
        </div>

        <div style="margin-top:14px;border-top:1px solid #e5e7eb;padding-top:12px;">
            <h3 style="margin:0 0 8px;">AI 튜터</h3>
            <div id="chatMessages" style="max-height:220px;overflow:auto;border:1px solid #e5e7eb;border-radius:8px;padding:8px;background:#fafafa;"></div>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <textarea id="chatQuestion" placeholder="질문을 입력하세요" style="flex:1;min-height:58px;border:1px solid #d1d5db;border-radius:8px;padding:8px;"></textarea>
                <button type="button" id="chatSendBtn" class="action">전송</button>
            </div>
        </div>
    </section>

    <aside class="box">
        <h3 style="margin-bottom:10px;">차시 목록</h3>
        <div id="lessonList"></div>

        <div class="nav-row">
            <button type="button" id="prevBtn" class="action">이전강의</button>
            <button type="button" id="nextBtn" class="action">다음강의</button>
        </div>
    </aside>
</main>

<script th:inline="javascript">
(() => {
  const courseId = /*[[${courseId}]]*/ null;
  const lessons = /*[[${lessons}]]*/ [];
  const progressMap = /*[[${progressMap}]]*/ {};
  const selectedLessonId = /*[[${selectedLessonId}]]*/ null;

  const player = document.getElementById('player');
  const listEl = document.getElementById('lessonList');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let currentIndex = Math.max(0, lessons.findIndex(l => l.id === selectedLessonId));
  if (currentIndex < 0) currentIndex = 0;
  let lastSavedPercent = -1;

  function getProgress(lessonId){
    return progressMap[String(lessonId)] || progressMap[lessonId] || null;
  }

  function isDone(lessonId){
    const p = getProgress(lessonId);
    return !!(p && p.completed);
  }

  function currentLesson(){ return lessons[currentIndex] || null; }

  function renderList(){
    listEl.innerHTML = '';
    if (!lessons.length){
      listEl.innerHTML = '<div style="color:#6b7280;">표시할 차시가 없습니다.</div>';
      return;
    }

    lessons.forEach(l => {
      const div = document.createElement('div');
      const active = currentLesson() && currentLesson().id === l.id;
      const done = isDone(l.id);
      div.className = 'lesson-item' + (active ? ' active' : '');
      div.innerHTML = `
        <div class='li-row'>
          <div class='lesson-main'>
            <div class='thumb'>${l.thumbnailUrl ? '<img src="'+l.thumbnailUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:6px;">' : '썸네일'}</div>
            <div>
              <strong>${l.orderNo}. ${l.title}</strong>
              <div style='font-size:12px;color:#6b7280;'>${l.description || '-'}</div>
            </div>
          </div>
          ${done ? "<span class='done-badge'>완료</span>" : ""}
        </div>`;
      div.addEventListener('click', () => {
        currentIndex = lessons.findIndex(x => x.id === l.id);
        loadLesson();
      });
      listEl.appendChild(div);
    });
  }

  function loadLesson(){
    const lesson = currentLesson();
    if (!lesson) return;
    player.src = lesson.videoUrl;
    const p = getProgress(lesson.id);
    lastSavedPercent = p ? Number(p.progressPercent || 0) : -1;
    renderList();
  }

  function emitCourseProgressUpdated(updatedCourseId) {
    try {
      localStorage.setItem('lms-course-progress-updated', JSON.stringify({
        courseId: updatedCourseId,
        ts: Date.now()
      }));
    } catch (_) {}
  }

  async function saveProgress(percent, completed){
    const lesson = currentLesson();
    if (!lesson) return;

    const clamped = Math.max(0, Math.min(100, Math.floor(percent)));
    const doneAlready = isDone(lesson.id);
    if (!completed && doneAlready) return;
    if (!completed && clamped < 90 && clamped - lastSavedPercent < 5) return;

    const res = await fetch(`/api/lessons/${lesson.id}/progress`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({progressPercent: clamped, completed})
    });
    const json = await res.json().catch(()=>({}));
    if (json.success !== false) {
      progressMap[String(lesson.id)] = {
        progressPercent: Number(json.progressPercent ?? clamped),
        completed: !!json.completed
      };
      lastSavedPercent = Number(json.progressPercent ?? clamped);
      renderList();
      emitCourseProgressUpdated(json.courseId || courseId);
    }
  }

  prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; loadLesson(); }});
  nextBtn.addEventListener('click', () => { if (currentIndex < lessons.length - 1) { currentIndex++; loadLesson(); }});

  player.addEventListener('timeupdate', () => {
    if (!player.duration || !isFinite(player.duration)) return;
    const percent = (player.currentTime / player.duration) * 100;
    const lesson = currentLesson();
    if (!lesson) return;

    if (percent >= 90 && !isDone(lesson.id)) {
      saveProgress(percent, true);
    } else {
      saveProgress(percent, false);
    }
  });

  player.addEventListener('ended', () => saveProgress(100, true));

  const chatMessages = document.getElementById('chatMessages');
  const chatQuestion = document.getElementById('chatQuestion');
  const chatSendBtn = document.getElementById('chatSendBtn');

  function addChat(role, text){
    if (!chatMessages) return;
    const item = document.createElement('div');
    item.style.marginBottom = '8px';
    item.innerHTML = `<strong>${role}</strong><div style="white-space:pre-wrap;">${text || ''}</div>`;
    chatMessages.appendChild(item);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function buildRagContext(){
    const lesson = currentLesson();
    if (!lesson) return `${courseId || ''}`;
    return [
      `강의명: ${lesson.title || ''}`,
      `설명: ${lesson.description || ''}`,
      `차시번호: ${lesson.orderNo || ''}`
    ].join('\n');
  }

  function getPlaybackContext(){
    const lesson = currentLesson();
    const duration = Number(player?.duration || 0);
    const current = Number(player?.currentTime || 0);
    const watchedPercent = duration > 0 ? (current / duration) * 100 : 0;
    const lessonCompleted = !!(lesson && isDone(lesson.id));

    const totalLessons = lessons.length;
    const completedLessons = lessons.filter(l => isDone(l.id)).length;
    const coursePercent = totalLessons > 0 ? Math.round((completedLessons * 100) / totalLessons) : 0;

    return {
      lessonId: lesson?.id || null,
      lessonTitle: lesson?.title || '',
      currentTimeSec: current,
      durationSec: duration,
      watchedPercent,
      lessonCompleted,
      courseCompletedLessons: completedLessons,
      courseTotalLessons: totalLessons,
      coursePercent
    };
  }

  async function sendChat(){
    const q = (chatQuestion?.value || '').trim();
    if (!q) return;
    addChat('나', q);
    if (chatQuestion) chatQuestion.value = '';
    try {
      const playback = getPlaybackContext();
      const res = await fetch(`/api/learn/${courseId}/chat/query`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          question: q,
          ragContext: buildRagContext(),
          ...playback
        })
      });
      const json = await res.json().catch(()=>({}));
      if (!res.ok) {
        addChat('AI', json.message || '오류가 발생했습니다.');
        return;
      }
      addChat('AI', json.answer || '(응답 없음)');
    } catch (_) {
      addChat('AI', '챗봇 호출 중 오류가 발생했습니다.');
    }
  }

  chatSendBtn?.addEventListener('click', sendChat);
  chatQuestion?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  });

  loadLesson();
})();
</script>
</body>
</html>
