<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습지원</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <h1 class="logo"><a href="/" style="text-decoration:none;color:inherit;">LMS</a></h1>
        <nav class="main-nav">
            <a href="/courses">과정안내</a><a href="/enrollments/apply">수강신청</a><a href="/enrollments/me">내강의실</a><a href="/support">학습지원</a><a href="/customer-center">고객 센터</a><a href="/schedule">교육일정</a>
        </nav>
        <div class="top-auth"><a class="auth-link" href="/login">로그인</a><a class="auth-link auth-signup" href="/signup">회원가입</a></div>
    </div>
</header>
<main class="container content-wrap">
    <div class="search-row"><input id="pageSearchInput" type="text" placeholder="학습지원 검색"><button id="pageSearchBtn" type="button">검색</button></div>
    <section class="post-list" id="searchContainer">
        <article class="post-card search-item"><h3>[학습지원] 자주 묻는 질문</h3><p>학습진도 반영, 영상 재생 오류, 과제 제출 오류 해결 가이드를 제공합니다.</p></article>
        <article class="post-card search-item"><h3>[학습지원] 학습 가이드</h3><p>효율적인 주간 학습 계획표와 시간 관리 팁을 확인해보세요.</p></article>
        <article class="post-card search-item"><h3>[학습지원] 자료실 업데이트</h3><p>최신 강의 노트와 실습 파일이 자료실에 추가되었습니다.</p></article>
    </section>
</main>
<script>
(function(){
  const input = document.getElementById('pageSearchInput');
  const btn = document.getElementById('pageSearchBtn');
  const rows = Array.from(document.querySelectorAll('.search-item'));
  function run(){
    const q = (input.value||'').trim().toLowerCase();
    rows.forEach(r=>{ r.style.display = !q || r.textContent.toLowerCase().includes(q) ? '' : 'none'; });
  }
  btn.addEventListener('click', run);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();run();} });
})();
</script>
</body>
</html>
