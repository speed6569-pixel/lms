<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내강의실</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <h1 class="logo"><a href="/" style="text-decoration:none;color:inherit;">LMS</a></h1>
        <nav class="main-nav">
            <a href="/courses">과정안내</a><a href="/enrollments/apply">수강신청</a><a href="/enrollments/me">내강의실</a><a href="/support">학습지원</a><a href="/customer-center">고객 센터</a><a href="/schedule">교육일정</a>
        </nav>
        <div class="top-auth"><a class="auth-link" href="/login">로그인</a><a class="auth-link auth-signup" href="/signup">회원가입</a></div>
    </div>
</header>
<main class="container content-wrap">
    <div class="search-row">
        <input id="pageSearchInput" type="text" placeholder="내강의실 검색">
        <button id="pageSearchBtn" type="button">검색</button>
    </div>

    <div class="table-wrap">
        <table class="data-table" id="searchContainer">
            <thead>
            <tr><th>과목코드</th><th>교과목명</th><th>진행률</th><th>상태</th><th>담당교수</th></tr>
            </thead>
            <tbody>
            <tr class="search-item"><td>CSE201</td><td>웹프로그래밍</td><td>45%</td><td>수강중</td><td>김교수</td></tr>
            <tr class="search-item"><td>CSE301</td><td>데이터베이스</td><td>70%</td><td>수강중</td><td>이교수</td></tr>
            <tr class="search-item"><td>GEN101</td><td>커뮤니케이션 스킬</td><td>100%</td><td>수료</td><td>박교수</td></tr>
            </tbody>
        </table>
    </div>
</main>
<script>
(function(){
  const input = document.getElementById('pageSearchInput');
  const btn = document.getElementById('pageSearchBtn');
  const rows = Array.from(document.querySelectorAll('.search-item'));
  function run(){
    const q = (input.value||'').trim().toLowerCase();
    rows.forEach(r=>{ r.style.display = !q || r.textContent.toLowerCase().includes(q) ? '' : 'none'; });
  }
  btn.addEventListener('click', run);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();run();} });
})();
</script>
</body>
</html>
