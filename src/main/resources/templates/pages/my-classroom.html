<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <script defer th:src="@{/js/header-profile.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>



<main class="container content-wrap modern-mypage">
    <aside class="profile-sidebar card-surface">
        <div class="profile-avatar">U</div>
        <h2 class="profile-name">학습자 님</h2>
        <p class="profile-sub">LMS 마이페이지</p>

        <div class="status-item">
            <div class="status-head"><span>출석률</span><strong>92%</strong></div>
            <div class="progress-track"><span style="width:92%"></span></div>
        </div>
        <div class="status-item">
            <div class="status-head"><span>진도율</span><strong>68%</strong></div>
            <div class="progress-track"><span style="width:68%"></span></div>
        </div>

        <nav class="side-nav">
            <a href="/enrollments/me" class="active">마이페이지 홈</a>
            <a href="/enrollments/me?tab=ongoing">진행중 교육</a>
            <a href="/enrollments/me?tab=applied">신청중 교육</a>
        </nav>
    </aside>

    <section class="mypage-dashboard">
        <div class="card-surface">
            <div class="tab-row">
                <button type="button" class="tab-btn active">진행중 교육</button>
                <button type="button" class="tab-btn">신청중 교육</button>
            </div>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>강의명</th>
                        <th>교육 형태</th>
                        <th>교수</th>
                        <th>강의시간</th>
                        <th>가격</th>
                        <th>인원제한</th>
                        <th>신청</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.title}"></td>
                        <td>
                            <span class="type-tag"
                                  th:classappend="${course.number % 2 == 0} ? ' type-offline' : ' type-online'"
                                  th:text="${course.number % 2 == 0} ? '오프라인' : '온라인'"></span>
                        </td>
                        <td th:text="${course.professor}"></td>
                        <td th:text="${course.classTime}"></td>
                        <td th:text="${course.price}"></td>
                        <td th:text="|${course.enrolledCount}/${course.maxCount}|"></td>
                        <td>
                            <button type="button" class="apply-btn"
                                    th:attr="data-code=${course.courseCode},data-section=${course.section}"
                                    th:disabled="${course.enrolledCount >= course.maxCount}"
                                    th:text="${course.enrolledCount >= course.maxCount} ? '신청불가' : '신청'"
                                    onclick="submitApply(this)">신청</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="7">표시할 강의가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="dashboard-grid">
            <article class="card-surface lecture-card" th:each="course : ${courses}">
                <div class="lecture-thumb" th:text="${course.courseCode}"></div>
                <div class="lecture-body">
                    <h3 th:text="${course.title}"></h3>
                    <p th:text="|${course.professor} · ${course.classTime} · ${course.price}|"></p>
                    <div class="status-head"><span>수강 인원</span><strong th:text="|${course.enrolledCount}/${course.maxCount}|"></strong></div>
                    <div class="progress-track"><span th:style="|width:${(course.enrolledCount * 100) / course.maxCount}%|"></span></div>
                </div>
            </article>
        </div>
    </section>
</main>

<script>
    async function submitApply(button) {
        const courseCode = button.dataset.code;
        const section = button.dataset.section || '01';
        try {
            const body = new URLSearchParams({ courseCode, section }).toString();
            const response = await fetch('/enrollments/me/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body
            });
            const result = await response.json();
            alert(result.message || (result.success ? '신청 완료' : '신청 실패'));
        } catch (e) {
            alert('네트워크 오류가 발생했습니다.');
        }
    }
</script>
</body>
</html>
