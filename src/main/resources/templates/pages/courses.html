<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과정안내</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <script defer th:src="@{/js/header-profile.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>


<main class="container content-wrap">
    <form class="search-row" method="get" action="/courses">
        <select name="category">
            <option value="">과정구분 전체</option>
            <option value="전공" th:selected="${category == '전공'}">전공</option>
            <option value="기타" th:selected="${category == '기타'}">기타</option>
        </select>
        <select name="openedYear">
            <option value="">개설연도 전체</option>
            <option value="2026" th:selected="${openedYear == '2026'}">2026</option>
            <option value="2025" th:selected="${openedYear == '2025'}">2025</option>
        </select>
        <input type="text" name="keyword" th:value="${keyword}" placeholder="과정명/교수명/과목코드 검색">
        <button type="submit">검색</button>
    </form>

    <div class="table-wrap">
        <table class="data-table">
            <thead>
            <tr>
                <th>숫자</th><th>과정</th><th>운영 방식</th><th>제목</th><th>개설 연/월/일</th><th>학습정원</th><th>교수 이름</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.number}"></td>
                <td th:text="${course.process}"></td>
                <td th:text="${course.operation}"></td>
                <td th:text="${course.title}"></td>
                <td th:text="${course.openDate}"></td>
                <td th:text="${course.capacity}"></td>
                <td th:text="${course.professor}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(courses)}">
                <td colspan="7">검색 결과가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
