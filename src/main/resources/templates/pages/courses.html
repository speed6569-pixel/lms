<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과정안내</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <script defer th:src="@{/js/header-profile.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>


<main class="container content-wrap">
    <form class="search-row" method="get" action="/courses">
        <select name="jobGroup" id="jobGroupSelect">
            <option value="">직군 전체</option>
            <option th:each="g : ${jobGroups}" th:value="${g}" th:text="${g}" th:selected="${jobGroup == g}"></option>
        </select>
        <select name="jobLevel" id="jobLevelSelect">
            <option value="">직급 전체</option>
            <option th:each="lv : ${jobLevelsMap[jobGroup]}" th:value="${lv}" th:text="${lv}" th:selected="${jobLevel == lv}"></option>
        </select>
        <input type="text" name="keyword" th:value="${keyword}" placeholder="교과목명/담당교수/과목코드 검색">
        <button type="submit">검색</button>
    </form>

    <div class="table-wrap">
        <table class="data-table">
            <thead>
            <tr>
                <th>과목코드</th><th>직군</th><th>직급</th><th>교과목명</th><th>담당교수</th><th>강의시간</th><th>가격</th><th>인원제한</th><th>개설 연월일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.subjectCode}"></td>
                <td th:text="${course.jobGroup}"></td>
                <td th:text="${course.jobLevel}"></td>
                <td th:text="${course.courseName}"></td>
                <td th:text="${course.instructor}"></td>
                <td th:text="${course.scheduleText}"></td>
                <td th:text="${course.price}"></td>
                <td th:text="|${course.enrolledCount}/${course.capacity}|"></td>
                <td th:text="${course.openedDate}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(courses)}">
                <td colspan="9">검색 결과가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script>
(async function(){
  const group = document.getElementById('jobGroupSelect');
  const level = document.getElementById('jobLevelSelect');
  if(!group || !level) return;
  const selectedLevel = level.value;
  const map = await fetch('/api/meta/job-levels').then(r=>r.json()).catch(()=>({}));
  function render(){
    const g = group.value;
    const levels = g ? (map[g] || []) : [...new Set(Object.values(map).flat())];
    level.innerHTML = '<option value="">직급 전체</option>' + levels.map(v => `<option value="${v}">${v}</option>`).join('');
    if (levels.includes(selectedLevel)) level.value = selectedLevel;
  }
  group.addEventListener('change', render);
  render();
})();
</script>
</body>
</html>
