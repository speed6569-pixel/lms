<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>문의 상세</title><link rel="stylesheet" th:href="@{/css/home.css}"><link rel="stylesheet" th:href="@{/css/header-profile.css}"><script defer th:src="@{/js/header-profile.js}"></script><style>.wrap{max-width:900px;margin:24px auto;padding:0 16px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;white-space:pre-wrap;margin-bottom:12px}</style></head><body><div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div><main class="wrap"><div class="card"><h2 th:text="${post.title}"></h2><div th:text="${post.content}"></div><p th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm') : ''}"></p><p th:text="${post.status.name() == 'ANSWERED'} ? '답변완료' : '답변대기'"></p></div><div class="card" th:if="${post.answer != null and !#strings.isEmpty(post.answer)}"><h3>관리자 답변</h3><div th:text="${post.answer}"></div></div></main><div th:replace="~{fragments/footer :: siteFooter}"></div></body></html>
