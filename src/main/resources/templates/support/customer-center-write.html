<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>문의 작성</title><link rel="stylesheet" th:href="@{/css/home.css}"><link rel="stylesheet" th:href="@{/css/header-profile.css}"><script defer th:src="@{/js/header-profile.js}"></script><style>.wrap{max-width:900px;margin:24px auto;padding:0 16px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px}input,textarea{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:10px;margin:8px 0}</style></head><body><div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div><main class="wrap"><div class="card"><h2>문의 작성</h2><form method="post" action="/customer-center"><input name="title" placeholder="제목" required><textarea name="content" rows="10" placeholder="문의 내용을 입력하세요" required></textarea><button class="btn btn-primary" type="submit">등록</button></form></div></main><div th:replace="~{fragments/footer :: siteFooter}"></div></body></html>
