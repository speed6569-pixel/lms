<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객센터 문의</title>
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/header-profile.css}">
  <script defer th:src="@{/js/header-profile.js}"></script>
  <style>.wrap{max-width:1000px;margin:24px auto;padding:0 16px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left}</style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>
<main class="wrap">
  <div class="card">
    <div class="top"><h2>고객센터 문의</h2><a class="btn btn-primary" href="/customer-center/write">문의 작성</a></div>
    <table>
      <thead><tr><th>번호</th><th>제목</th><th>작성일</th><th>상태</th></tr></thead>
      <tbody>
      <tr th:each="p : ${posts}">
        <td th:text="${p.id}"></td>
        <td><a th:href="@{/customer-center/{id}(id=${p.id})}" th:text="${p.title}"></a></td>
        <td th:text="${p.createdAt != null ? #temporals.format(p.createdAt, 'yyyy-MM-dd HH:mm') : ''}"></td>
        <td th:text="${p.status.name() == 'ANSWERED'} ? '답변완료' : '답변대기'"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(posts)}"><td colspan="4">등록된 문의가 없습니다.</td></tr>
      </tbody>
    </table>
  </div>
</main>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
