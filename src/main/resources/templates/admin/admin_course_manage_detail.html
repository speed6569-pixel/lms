<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><body>
<th:block th:fragment="content">
<h2>강의 상세 관리</h2>
<div class="admin-card" style="box-shadow:none;border:1px solid #e5e7eb;padding:12px;margin-bottom:10px;" th:text="|${course.subjectCode} / ${course.subjectName} / ${course.instructor} / ${course.price}원 / 정원 ${course.capacity}|"></div>
<div class="admin-toolbar"><button class="btn-primary" onclick="addRow()">차시 추가</button><button class="btn-primary" onclick="saveRows()">저장</button></div>
<div id="lessonRows"></div>
<div class="admin-table table-wrap"><table><thead><tr><th>순서</th><th>차시명</th><th>영상URL</th><th>삭제</th></tr></thead><tbody>
<tr th:each="l : ${lessons}"><td th:text="${l.orderNo}"></td><td th:text="${l.title}"></td><td th:text="${l.videoUrl}"></td><td><button class="btn-danger" th:attr="onclick=|deleteLesson(${l.id})|">삭제</button></td></tr>
</tbody></table></div>
<div class="admin-table table-wrap" style="margin-top:12px;"><table><thead><tr><th>아이디</th><th>이름</th><th>이메일</th><th>상태</th><th>신청일</th></tr></thead><tbody>
<tr th:each="u : ${learners}"><td th:text="${u.userId}"></td><td th:text="${u.name}"></td><td th:text="${u.email}"></td><td th:text="${u.status}"></td><td th:text="${u.appliedAt}"></td></tr>
</tbody></table></div>
<script th:inline="javascript">
const courseId = /*[[${course.id}]]*/ 0;
async function uploadVideo(file){const fd=new FormData();fd.append('file',file);const r=await fetch('/admin/api/uploads/video',{method:'POST',body:fd});const j=await r.json();if(!r.ok) throw new Error(j.message||'업로드 실패');return j.url;}
function addRow(){const box=document.getElementById('lessonRows');const d=document.createElement('div');d.className='admin-toolbar';d.innerHTML=`<input class='o' type='number' placeholder='순서' style='width:90px'><input class='t' placeholder='차시명'><input class='d' placeholder='설명'><input class='f' type='file' accept='video/*'>`;box.appendChild(d);}
async function saveRows(){const rows=[...document.querySelectorAll('#lessonRows > div')];const lessons=[];for(const r of rows){const f=r.querySelector('.f').files[0];if(!f) continue;const url=await uploadVideo(f);lessons.push({orderNo:Number(r.querySelector('.o').value||1),title:r.querySelector('.t').value,description:r.querySelector('.d').value,videoUrl:url});} if(!lessons.length){alert('추가할 차시가 없습니다.');return;} await fetch(`/admin/api/courses/${courseId}/lessons`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lessons)}); location.reload();}
async function deleteLesson(id){if(!confirm('삭제하시겠습니까?')) return; await fetch('/admin/api/lessons/'+id,{method:'DELETE'}); location.reload();}
</script>
</th:block>
</body></html>
