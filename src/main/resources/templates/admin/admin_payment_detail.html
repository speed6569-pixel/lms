<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><body>
<th:block th:fragment="content">
  <div class="admin-toolbar"><a class="btn-secondary" href="/admin/payments">목록으로</a></div>
  <p th:if="${message}" style="color:#166534;" th:text="${message}"></p>
  <p th:if="${errorMessage}" style="color:#b91c1c;" th:text="${errorMessage}"></p>
  <h2>결제 내역 상세</h2>
  <div class="admin-table table-wrap"><table><tbody>
    <tr><th>결제ID</th><td th:text="${view.item.paymentId}"></td></tr>
    <tr><th>결제일시(구매일)</th><td th:text="${#temporals.format(view.item.createdAt,'yyyy-MM-dd HH:mm:ss')}"></td></tr>
    <tr><th>사용자</th><td th:text="|${view.item.loginId} / ${view.item.userName} (ID:${view.item.userId})|"></td></tr>
    <tr><th>강의</th><td th:text="${view.item.courseId == null ? '-' : view.item.courseCode + ' / ' + view.item.courseTitle}"></td></tr>
    <tr><th>구분</th><td th:text="${view.item.type}"></td></tr>
    <tr><th>금액</th><td th:text="|${view.item.amount} P|"></td></tr>
    <tr><th>메모</th><td th:text="${view.item.memo}"></td></tr>
    <tr><th>현재 잔액</th><td th:text="|${view.item.pointBalance} P|"></td></tr>
    <tr><th>수강 상태</th><td th:text="${view.item.enrollmentStatus}"></td></tr>
    <tr><th>현재 학습 진도율</th><td th:text="|${view.progressPercent}%|"></td></tr>
    <tr><th>환불 조건(진도 30% 미만)</th><td th:text="${view.under30Progress ? '충족' : '미충족'}"></td></tr>
    <tr><th>환불 조건(구매 후 3일 이내)</th><td th:text="${view.within3Days ? '충족' : '미충족'}"></td></tr>
    <tr><th>환불 가능 여부</th><td th:text="${view.refundable ? '가능' : '불가'}"></td></tr>
    <tr><th>판정 사유</th><td th:text="${view.refundableReason}"></td></tr>
    <tr><th>환불 상태</th><td th:text="${view.item.refundStatus}"></td></tr>
    <tr><th>환불 신청일</th><td th:text="${view.item.refundRequestedAt == null ? '-' : #temporals.format(view.item.refundRequestedAt,'yyyy-MM-dd HH:mm:ss')}"></td></tr>
    <tr><th>환불 처리일</th><td th:text="${view.item.refundProcessedAt == null ? '-' : #temporals.format(view.item.refundProcessedAt,'yyyy-MM-dd HH:mm:ss')}"></td></tr>
    <tr><th>거절 사유</th><td th:text="${view.item.refundRejectReason == null ? '-' : view.item.refundRejectReason}"></td></tr>
  </tbody></table></div>

  <div style="margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <form th:if="${view.item.refundStatus == 'REFUND_REQUESTED'}" th:action="@{/admin/payments/{id}/refund/approve(id=${view.item.paymentId})}" method="post" onsubmit="return confirm('환불 승인 처리하시겠습니까?');">
      <button class="btn-primary" type="submit" th:disabled="${!view.refundable}" th:title="${!view.refundable ? view.refundableReason : ''}">환불 승인</button>
    </form>

    <form th:if="${view.item.refundStatus == 'REFUND_REQUESTED'}" th:action="@{/admin/payments/{id}/refund/reject(id=${view.item.paymentId})}" method="post" style="display:flex; gap:8px; align-items:center;">
      <input type="text" name="reason" placeholder="거절 사유 입력(선택)">
      <button class="btn-danger" type="submit" onclick="return confirm('환불 거절 처리하시겠습니까?');">환불 거절</button>
    </form>

    <span th:if="${view.item.refundStatus != 'REFUND_REQUESTED'}" style="color:#6b7280;">처리 가능한 환불 신청 건이 아닙니다.</span>
  </div>
</th:block>
</body></html>
