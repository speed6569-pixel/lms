<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
    <div class="row" style="margin-bottom:12px;"><a href="/admin/payments">← 목록으로</a></div>
    <h2>결제/포인트 상세</h2>
    <div style="display:grid;grid-template-columns:180px 1fr;gap:10px;">
        <div style="color:#6b7280;">결제ID</div><div th:text="${item.paymentId}"></div>
        <div style="color:#6b7280;">결제일시</div><div th:text="${#temporals.format(item.createdAt,'yyyy-MM-dd HH:mm:ss')}"></div>
        <div style="color:#6b7280;">사용자</div><div th:text="|${item.loginId} / ${item.userName} (ID:${item.userId})|"></div>
        <div style="color:#6b7280;">구분</div><div th:text="${item.type}"></div>
        <div style="color:#6b7280;">금액</div><div th:text="|${item.amount} P|"></div>
        <div style="color:#6b7280;">메모</div><div th:text="${item.memo}"></div>
        <div style="color:#6b7280;">현재 잔액</div><div th:text="|${item.pointBalance} P|"></div>
        <div style="color:#6b7280;">강의</div><div th:text="${item.courseId == null ? '-' : item.courseCode + ' / ' + item.courseTitle}"></div>
        <div style="color:#6b7280;">관련 수강신청 상태</div><div th:text="${item.enrollmentStatus == null ? '-' : item.enrollmentStatus}"></div>
    </div>
</th:block>
</body>
</html>
