<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><body>
<th:block th:fragment="content">
  <div class="admin-toolbar"><a class="btn-secondary" href="/admin/payments">목록으로</a></div>
  <h2>결제 내역 상세</h2>
  <div class="admin-table table-wrap"><table><tbody>
    <tr><th>결제ID</th><td th:text="${item.paymentId}"></td></tr>
    <tr><th>결제일시</th><td th:text="${#temporals.format(item.createdAt,'yyyy-MM-dd HH:mm:ss')}"></td></tr>
    <tr><th>사용자</th><td th:text="|${item.loginId} / ${item.userName} (ID:${item.userId})|"></td></tr>
    <tr><th>구분</th><td th:text="${item.type}"></td></tr>
    <tr><th>금액</th><td th:text="|${item.amount} P|"></td></tr>
    <tr><th>메모</th><td th:text="${item.memo}"></td></tr>
    <tr><th>현재 잔액</th><td th:text="|${item.pointBalance} P|"></td></tr>
  </tbody></table></div>
</th:block>
</body></html>
