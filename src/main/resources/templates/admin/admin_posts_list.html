<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 관리</title>
  <link rel="stylesheet" th:href="@{/css/home.css}"><link rel="stylesheet" th:href="@{/css/header-profile.css}"><script defer th:src="@{/js/header-profile.js}"></script>
  <style>.wrap{max-width:1200px;margin:24px auto;padding:0 16px}.panel{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px}.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #e5e7eb;padding:8px;font-size:13px;text-align:left}button,a.btn{height:34px;border:0;border-radius:8px;background:#2563eb;color:#fff;padding:0 12px;text-decoration:none;display:inline-flex;align-items:center}</style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>
<main class="wrap"><section class="panel">
  <h2>게시물 관리</h2>
  <form class="row" method="get" action="/admin/posts">
    <select name="category"><option value="">전체</option><option value="SUPPORT" th:selected="${category=='SUPPORT'}">공지사항</option><option value="CS" th:selected="${category=='CS'}">고객센터</option><option value="SCHEDULE" th:selected="${category=='SCHEDULE'}">교육일정</option></select>
    <input name="q" th:value="${q}" placeholder="제목 검색">
    <button type="submit">검색</button>
    <a class="btn" href="/admin/posts/new">등록</a>
  </form>
  <table><thead><tr><th>ID</th><th>카테고리</th><th>제목</th><th>상태</th><th>고정</th><th>관리</th></tr></thead><tbody>
    <tr th:each="p:${posts}"><td th:text="${p.id}"></td><td th:text="${p.category}"></td><td th:text="${p.title}"></td><td th:text="${p.status}"></td><td th:text="${p.pinned} ? 'Y':'N'"></td>
      <td>
        <a class="btn" th:href="@{|/admin/posts/${p.id}/edit|}">수정</a>
        <form th:action="@{|/admin/posts/${p.id}/publish|}" method="post" style="display:inline"><button type="submit">게시</button></form>
        <form th:action="@{|/admin/posts/${p.id}/archive|}" method="post" style="display:inline"><button type="submit" style="background:#6b7280">보관</button></form>
        <form th:action="@{|/admin/posts/${p.id}/delete|}" method="post" style="display:inline"><button type="submit" style="background:#ef4444">삭제</button></form>
      </td>
    </tr>
  </tbody></table>
</section></main>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body></html>
