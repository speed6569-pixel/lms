<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><body>
<th:block th:fragment="content">
  <h2>강의 콘텐츠 관리</h2>
  <div class="admin-table table-wrap"><table><thead><tr><th>ID</th><th>과목코드</th><th>교과목명</th><th>교수</th><th>요일</th><th>강의시간</th><th>가격</th><th>인원제한</th><th>관리</th></tr></thead><tbody>
  <tr th:each="c : ${courses}"><td th:text="${c.id}"></td><td th:text="${c.subjectCode}"></td><td th:text="${c.subjectName}"></td><td th:text="${c.instructor}"></td><td th:text="${#strings.isEmpty(c.selectedDays) ? '-' : c.selectedDays}"></td><td th:text="${c.classTime}"></td><td th:text="${c.price}"></td><td th:text="${c.capacity}"></td><td><a class="btn-primary" th:href="@{/admin/course-contents/{id}(id=${c.id})}">상세관리</a></td></tr>
  <tr th:if="${#lists.isEmpty(courses)}"><td colspan="9">강의가 없습니다.</td></tr>
  </tbody></table></div>
</th:block>
</body></html>
