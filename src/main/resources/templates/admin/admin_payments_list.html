<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><body>
<th:block th:fragment="content">
  <h2>결제 내역 관리</h2>
  <form class="admin-toolbar" method="get" action="/admin/payments">
    <input name="qUser" placeholder="사용자 아이디/이름" th:value="${qUser}">
    <input name="qCourse" placeholder="강의명/과목코드" th:value="${qCourse}">
    <select name="type"><option value="" th:selected="${type == ''}">전체</option><option value="EARN" th:selected="${type=='EARN'}">충전</option><option value="SPEND" th:selected="${type=='SPEND'}">사용</option><option value="REFUND" th:selected="${type=='REFUND'}">환불</option></select>
    <input type="date" name="from" th:value="${from}"><input type="date" name="to" th:value="${to}">
    <button class="btn-primary" type="submit">조회</button>
  </form>
  <div class="admin-table table-wrap"><table><thead><tr><th>결제ID</th><th>결제일시</th><th>사용자</th><th>구분</th><th>강의</th><th>금액</th><th>메모</th><th>상세</th></tr></thead><tbody>
  <tr th:each="r : ${rows}"><td th:text="${r.paymentId}"></td><td th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td><td th:text="|${r.loginId} / ${r.userName}|"></td><td th:text="${r.type}"></td><td th:text="${r.courseId == null ? '-' : r.courseCode + ' / ' + r.courseTitle}"></td><td th:text="${r.amount}"></td><td th:text="${r.memo}"></td><td><a class="btn-primary" th:href="@{/admin/payments/{id}(id=${r.paymentId})}">보기</a></td></tr>
  <tr th:if="${#lists.isEmpty(rows)}"><td colspan="8">조회 결과가 없습니다.</td></tr>
  </tbody></table></div>
</th:block>
</body></html>
