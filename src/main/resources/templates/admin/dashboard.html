<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <style>
        .admin-wrap{max-width:1200px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:220px 1fr;gap:16px}
        .side,.panel{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
        .side .nav-btn{display:block;width:100%;text-align:left;padding:9px 10px;border-radius:10px;text-decoration:none;color:#1f2937;border:0;background:#fff;cursor:pointer}
        .side .nav-btn:hover,.side .nav-btn.active{background:#eff6ff}
        .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .card{background:#f8fbff;border:1px solid #dbeafe;border-radius:12px;padding:12px}
        .section{display:none}.section.active{display:block}
        .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
        input,select{height:36px;border:1px solid #d1d5db;border-radius:8px;padding:0 10px}
        button.action{height:36px;border:0;border-radius:8px;background:#2563eb;color:#fff;padding:0 12px;cursor:pointer}
        table{width:100%;border-collapse:collapse} th,td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left;font-size:13px}
        @media (max-width:900px){.admin-wrap{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>

<main class="admin-wrap">
    <aside class="side">
        <h3>관리 메뉴</h3>
        <button class="nav-btn active" data-target="stats">통계(대시보드)</button>
        <button class="nav-btn" data-target="courses">강의 관리</button>
        <button class="nav-btn" data-target="enrollments">수강신청 관리</button>
        <button class="nav-btn" data-target="attendance">출석 관리</button>
        <button class="nav-btn" data-target="users">사용자 관리</button>
        <a class="nav-btn" href="/admin/posts" style="display:block;text-decoration:none;">게시물 관리</a>
    </aside>

    <section class="panel">
        <div id="sec-stats" class="section active">
            <h2>대시보드 통계</h2>
            <div class="cards" id="statsCards"></div>
        </div>

        <div id="sec-courses" class="section">
            <h2>강의 관리</h2>
            <div class="row">
                <select id="cStatus"><option value="OPEN">모집중</option><option value="CLOSED">마감</option></select>
                <input id="cCode" placeholder="과목코드">
                <select id="cJobGroup"><option>개발</option><option>영업</option><option>CS</option><option>물류</option><option>기획</option></select>
                <select id="cJobLevel"><option>사원</option><option>대리</option><option>과장</option><option>부장</option></select>
                <input id="cTitle" placeholder="교과목명">
                <input id="cProfessor" placeholder="교수">
                <input id="cPrice" placeholder="가격" type="number" min="0">
                <input id="cMax" placeholder="인원제한" type="number" min="0">
                <label><input type="radio" name="dayMode" value="MULTI" checked>개별 선택</label>
                <label><input type="radio" name="dayMode" value="RANGE">범위 선택</label>
                <div id="multiDayBox">
                    <label><input type="checkbox" class="day-check" value="MON">월</label>
                    <label><input type="checkbox" class="day-check" value="TUE">화</label>
                    <label><input type="checkbox" class="day-check" value="WED">수</label>
                    <label><input type="checkbox" class="day-check" value="THU">목</label>
                    <label><input type="checkbox" class="day-check" value="FRI">금</label>
                </div>
                <div id="rangeDayBox" style="display:none;">
                    <select id="startDay"><option value="MON">월</option><option value="TUE">화</option><option value="WED">수</option><option value="THU">목</option><option value="FRI">금</option></select>
                    ~
                    <select id="endDay"><option value="MON">월</option><option value="TUE">화</option><option value="WED">수</option><option value="THU">목</option><option value="FRI">금</option></select>
                </div>
                <input id="cStart" type="time" value="09:00">
                <input id="cEnd" type="time" value="11:00">
                <button class="action" onclick="createCourse()">강의 생성</button>
            </div>
            <table><thead><tr><th>신청</th><th>ID</th><th>과목코드</th><th>직군</th><th>직급</th><th>교과목명</th><th>교수</th><th>강의 시간</th><th>가격</th><th>인원제한</th><th>삭제</th></tr></thead><tbody id="courseBody"></tbody></table>
        </div>

        <div id="sec-enrollments" class="section">
            <h2>수강신청 관리</h2>
            <div class="row">
                <select id="eStatus" onchange="loadEnrollments()"><option>APPLIED</option><option>WAITLIST</option><option>APPROVED</option><option>REJECTED</option><option>CANCELLED</option></select>
            </div>
            <table><thead><tr><th>ID</th><th>사용자(아이디/이름)</th><th>강의(과목코드/강의명)</th><th>강의시간</th><th>가격</th><th>결제여부</th><th>상태</th><th>처리</th></tr></thead><tbody id="enrollmentBody"></tbody></table>
        </div>

        <div id="sec-attendance" class="section">
            <h2>출석 관리</h2>
            <div class="row">
                <input id="aEnrollmentId" placeholder="enrollmentId" type="number">
                <input id="aDate" placeholder="YYYY-MM-DD">
                <select id="aStatus"><option>PRESENT</option><option>LATE</option><option>ABSENT</option><option>EXCUSED</option></select>
                <input id="aAttended" placeholder="참석분" type="number">
                <input id="aTotal" placeholder="총분" type="number">
                <button class="action" onclick="attendanceCheck()">출석 저장</button>
            </div>
        </div>

        <div id="sec-users" class="section">
            <h2>사용자 관리</h2>
            <div class="row">
                <input id="uq" placeholder="아이디(username) 또는 이름(name)" style="min-width:280px">
                <button class="action" onclick="loadAdminUsers()">검색</button>
            </div>
            <table>
                <thead>
                <tr><th>ID</th><th>username</th><th>name</th><th>status</th><th>role</th><th>이용기간</th><th>총결제액</th><th>참여강의수</th><th>변경</th></tr>
                </thead>
                <tbody id="adminUserBody"></tbody>
            </table>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

<script>
  const sections = ['stats','courses','enrollments','attendance','users'];
  document.querySelectorAll('.nav-btn[data-target]').forEach(btn=>btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn[data-target]').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
    sections.forEach(s=>document.getElementById('sec-'+s).classList.remove('active'));
    document.getElementById('sec-'+btn.dataset.target).classList.add('active');
  }));

  async function loadStats(){
    const stats = await (await fetch('/admin/api/stats')).json();
    document.getElementById('statsCards').innerHTML = Object.entries(stats).map(([k,v]) => `<div class='card'><strong>${k}</strong><div style='font-size:24px;margin-top:6px;'>${v}</div></div>`).join('');
  }
  async function loadCourses(){
    const rows = await (await fetch('/admin/api/courses')).json();
    document.getElementById('courseBody').innerHTML = rows.map(v=>`<tr><td><button class='action' onclick="toggleStatus(${v.id},'${v.status||'OPEN'}')">${v.applyStatus||'모집중'}</button></td><td>${v.id}</td><td>${v.subjectCode||''}</td><td>${v.jobGroup||''}</td><td>${v.jobLevel||''}</td><td>${v.subjectName||''}</td><td>${v.instructor||''}</td><td>${v.classTime||'-'}</td><td>${v.price||0}</td><td>${v.capacity||0}</td><td><button class='action' style='background:#ef4444' onclick='deleteCourse(${v.id})'>삭제</button></td></tr>`).join('');
  }
  function currentDayMode(){ return document.querySelector('input[name="dayMode"]:checked')?.value || 'MULTI'; }
  function toggleDayMode(){
    const mode = currentDayMode();
    document.getElementById('multiDayBox').style.display = mode==='MULTI' ? '' : 'none';
    document.getElementById('rangeDayBox').style.display = mode==='RANGE' ? '' : 'none';
  }

  async function createCourse(){
    const mode = currentDayMode();
    const days = [...document.querySelectorAll('.day-check:checked')].map(v=>v.value);
    if(mode==='MULTI' && days.length===0){ alert('요일을 1개 이상 선택하세요.'); return; }

    await fetch('/admin/api/courses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      subjectCode:cCode.value,jobGroup:cJobGroup.value,jobLevel:cJobLevel.value,subjectName:cTitle.value,instructor:cProfessor.value,
      price:Number(cPrice.value||0),capacity:Number(cMax.value||0),status:cStatus.value,
      dayMode:mode, days,
      startDay:document.getElementById('startDay').value,
      endDay:document.getElementById('endDay').value,
      startTime:cStart.value,endTime:cEnd.value
    })});
    await loadCourses(); await loadStats();
  }
  async function toggleStatus(id,current){
    const next = current==='OPEN' ? 'CLOSED' : 'OPEN';
    await fetch('/admin/api/courses/'+id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:next})});
    await loadCourses();
  }
  async function deleteCourse(id){
    if(!confirm('강의를 삭제하시겠습니까? 연결된 세션/신청/출석/진도 데이터도 삭제됩니다.')) return;
    await fetch('/admin/api/courses/'+id,{method:'DELETE'});
    await loadCourses(); await loadEnrollments(); await loadStats();
  }
  async function loadEnrollments(){
    const rows = await (await fetch('/admin/api/enrollments?status='+eStatus.value)).json();
    document.getElementById('enrollmentBody').innerHTML = rows.map(v=>`<tr><td>${v.enrollmentId}</td><td>${v.username||''} / ${v.name||''}</td><td>${v.subjectCode||''} / ${v.courseName||''}</td><td>${v.scheduleText||'-'}</td><td>${Number(v.price||0).toLocaleString()}원</td><td>${v.paymentStatus||'UNPAID'}</td><td>${v.status||''}</td><td><button class='action' onclick='approve(${v.enrollmentId})'>승인</button> <button class='action' style='background:#ef4444' onclick='reject(${v.enrollmentId})'>반려</button></td></tr>`).join('');
  }
  async function approve(id){ await fetch('/admin/api/enrollments/'+id+'/approve',{method:'POST'}); await loadEnrollments(); await loadStats(); }
  async function reject(id){ await fetch('/admin/api/enrollments/'+id+'/reject',{method:'POST'}); await loadEnrollments(); await loadStats(); }
  async function attendanceCheck(){
    await fetch('/admin/api/attendance/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enrollmentId:Number(aEnrollmentId.value),sessionDate:aDate.value,status:aStatus.value,minutesAttended:Number(aAttended.value||0),minutesTotal:Number(aTotal.value||0)})});
    alert('출석 저장 완료');
  }
  async function loadAdminUsers(){
    const q = document.getElementById('uq').value || '';
    const rows = await (await fetch('/admin/api/users?q='+encodeURIComponent(q))).json();
    const body = document.getElementById('adminUserBody');
    if(!rows || rows.length===0){ body.innerHTML = `<tr><td colspan='9'>검색 결과가 없습니다.</td></tr>`; return; }
    body.innerHTML = rows.map(v => `
      <tr>
        <td>${v.id}</td>
        <td>${v.username||''}</td>
        <td>${v.name||''}</td>
        <td><select id='ust-${v.id}'><option value='ACTIVE' ${v.status==='ACTIVE'?'selected':''}>ACTIVE</option><option value='BLOCKED' ${v.status==='BLOCKED'?'selected':''}>BLOCKED</option></select></td>
        <td><select id='url-${v.id}'><option value='ROLE_USER' ${v.role==='ROLE_USER'?'selected':''}>USER</option><option value='ROLE_ADMIN' ${v.role==='ROLE_ADMIN'?'selected':''}>ADMIN</option></select></td>
        <td>${v.usagePeriod||''}</td>
        <td>${Number(v.totalPayment||0).toLocaleString()}원</td>
        <td>${v.runningCourseCount||0}</td>
        <td><button class='action' onclick='saveAdminUser(${v.id})'>저장</button></td>
      </tr>`).join('');
  }

  async function saveAdminUser(id){
    const role = document.getElementById('url-'+id).value;
    const status = document.getElementById('ust-'+id).value;
    const res = await fetch('/admin/api/users/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({role,status})});
    const json = await res.json().catch(()=>({message:'저장 실패'}));
    if(!res.ok){ alert(json.message||'저장 실패'); return; }
    alert('저장되었습니다.');
    await loadAdminUsers();
  }

  document.getElementById('uq')?.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); loadAdminUsers(); }});
  document.querySelectorAll('input[name="dayMode"]').forEach(v=>v.addEventListener('change', toggleDayMode));
  toggleDayMode();
  loadStats(); loadCourses(); loadEnrollments(); loadAdminUsers();
</script>
</body>
</html>
