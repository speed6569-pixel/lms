<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><body>
<th:block th:fragment="content">
  <h2>강의 관리</h2>
  <div class="admin-toolbar">
    <select id="cStatus"><option value="OPEN">모집중</option><option value="CLOSED">마감</option></select>
    <input id="cCode" placeholder="과목코드"><input id="cTitle" placeholder="교과목명"><input id="cProfessor" placeholder="교수">
    <input id="cPrice" type="number" min="0" placeholder="가격"><input id="cMax" type="number" min="0" placeholder="인원제한">
    <input id="cStart" type="time" value="09:00"><input id="cEnd" type="time" value="11:00">
    <button class="btn-primary" onclick="createCourse()">강의 생성</button>
  </div>
  <div class="admin-table table-wrap"><table><thead><tr><th>신청</th><th>ID</th><th>과목코드</th><th>교과목명</th><th>교수</th><th>강의시간</th><th>가격</th><th>인원제한</th><th>삭제</th></tr></thead><tbody id="courseBody"></tbody></table></div>
<script>
 async function loadCourses(){ const rows = await (await fetch('/admin/api/courses')).json(); document.getElementById('courseBody').innerHTML = rows.map(v=>`<tr><td><button class='btn-primary' onclick="toggleStatus(${v.id},'${v.status||'OPEN'}')">${v.applyStatus||'모집중'}</button></td><td>${v.id}</td><td>${v.subjectCode||''}</td><td>${v.subjectName||''}</td><td>${v.instructor||''}</td><td>${v.classTime||'-'}</td><td>${v.price||0}</td><td>${v.capacity||0}</td><td><button class='btn-danger' onclick='deleteCourse(${v.id})'>삭제</button></td></tr>`).join(''); }
 async function createCourse(){ const payload={subjectCode:cCode.value,subjectName:cTitle.value,instructor:cProfessor.value,price:Number(cPrice.value||0),capacity:Number(cMax.value||0),status:cStatus.value,dayMode:'MULTI',days:['MON'],startDay:'MON',endDay:'MON',startTime:cStart.value,endTime:cEnd.value}; await fetch('/admin/api/courses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); loadCourses(); }
 async function toggleStatus(id,current){ const next=current==='OPEN'?'CLOSED':'OPEN'; await fetch('/admin/api/courses/'+id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:next})}); loadCourses(); }
 async function deleteCourse(id){ if(!confirm('삭제하시겠습니까?')) return; await fetch('/admin/api/courses/'+id,{method:'DELETE'}); loadCourses(); }
 loadCourses();
</script>
</th:block>
</body></html>
