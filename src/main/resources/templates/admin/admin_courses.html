<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 강의관리</title>
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/header-profile.css}">
  <style>
    .wrap{max-width:1200px;margin:24px auto;padding:0 16px}
    .panel{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    input{height:36px;border:1px solid #d1d5db;border-radius:8px;padding:0 10px}
    button{height:36px;border:0;border-radius:8px;background:#2563eb;color:#fff;padding:0 12px;cursor:pointer}
    table{width:100%;border-collapse:collapse} th,td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left;font-size:13px}
  </style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>
<main class="wrap">
  <section class="panel">
    <h2>강의 관리</h2>
    <div class="row">
      <select id="cStatus"><option value="OPEN">모집중</option><option value="CLOSED">마감</option></select>
      <input id="cCode" placeholder="과목코드(subject_code)">
      <select id="cJobGroup"><option>개발</option><option>영업</option><option>CS</option><option>물류</option><option>기획</option></select>
      <select id="cJobLevel"><option>사원</option><option>대리</option><option>과장</option><option>부장</option></select>
      <input id="cTitle" placeholder="교과목명">
      <input id="cProfessor" placeholder="교수">
      <input id="cPrice" placeholder="가격" type="number" min="0">
      <input id="cMax" placeholder="인원제한" type="number" min="0">
      <label><input type="radio" name="dayMode" value="MULTI" checked> 개별 선택</label>
      <label><input type="radio" name="dayMode" value="RANGE"> 범위 선택</label>
      <div id="multiDayBox">
        <label><input type="checkbox" class="day-check" value="MON">월</label>
        <label><input type="checkbox" class="day-check" value="TUE">화</label>
        <label><input type="checkbox" class="day-check" value="WED">수</label>
        <label><input type="checkbox" class="day-check" value="THU">목</label>
        <label><input type="checkbox" class="day-check" value="FRI">금</label>
      </div>
      <div id="rangeDayBox" style="display:none;">
        <select id="startDay"><option value="MON">월</option><option value="TUE">화</option><option value="WED">수</option><option value="THU">목</option><option value="FRI">금</option></select>
        ~
        <select id="endDay"><option value="MON">월</option><option value="TUE">화</option><option value="WED">수</option><option value="THU">목</option><option value="FRI">금</option></select>
      </div>
      <input id="cStart" type="time" value="09:00">
      <input id="cEnd" type="time" value="11:00">
      <button onclick="createCourse()">강의 생성</button>
    </div>
    <table>
      <thead><tr><th>신청</th><th>ID</th><th>과목코드</th><th>직군</th><th>직급</th><th>교과목명</th><th>교수</th><th>강의시간</th><th>가격</th><th>인원제한</th><th>삭제</th></tr></thead>
      <tbody id="courseBody"></tbody>
    </table>
  </section>
</main>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
<script>
 async function loadCourses(){
   const rows = await (await fetch('/admin/api/courses')).json();
   document.getElementById('courseBody').innerHTML = rows.map(v=>`<tr><td><button onclick="toggleStatus(${v.id},'${v.status||'OPEN'}')">${v.applyStatus||'모집중'}</button></td><td>${v.id}</td><td>${v.subjectCode||''}</td><td>${v.jobGroup||''}</td><td>${v.jobLevel||''}</td><td>${v.subjectName||''}</td><td>${v.instructor||''}</td><td>${v.classTime||'-'}</td><td>${v.price||0}</td><td>${v.capacity||0}</td><td><button style='background:#ef4444' onclick='deleteCourse(${v.id})'>삭제</button></td></tr>`).join('');
 }
 function currentDayMode(){ return document.querySelector('input[name="dayMode"]:checked')?.value || 'MULTI'; }
 function toggleDayMode(){
   const mode = currentDayMode();
   document.getElementById('multiDayBox').style.display = mode==='MULTI' ? '' : 'none';
   document.getElementById('rangeDayBox').style.display = mode==='RANGE' ? '' : 'none';
 }

 async function createCourse(){
   const mode = currentDayMode();
   const days = [...document.querySelectorAll('.day-check:checked')].map(v=>v.value);
   if(mode==='MULTI' && days.length===0){ alert('요일을 1개 이상 선택하세요.'); return; }

   const payload = {
     subjectCode:cCode.value,jobGroup:cJobGroup.value,jobLevel:cJobLevel.value,subjectName:cTitle.value,instructor:cProfessor.value,
     price:Number(cPrice.value||0),capacity:Number(cMax.value||0),status:cStatus.value,
     dayMode:mode, days,
     startDay:document.getElementById('startDay').value,
     endDay:document.getElementById('endDay').value,
     startTime:cStart.value,endTime:cEnd.value
   };

   const res = await fetch('/admin/api/courses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
   if(!res.ok){ const e = await res.json().catch(()=>({message:'생성 실패'})); alert(e.message||'생성 실패'); return; }
   await loadCourses();
 }
 async function toggleStatus(id,current){
   const next = current==='OPEN' ? 'CLOSED' : 'OPEN';
   await fetch('/admin/api/courses/'+id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:next})});
   await loadCourses();
 }
 async function deleteCourse(id){
   if(!confirm('삭제하시겠습니까?')) return;
   await fetch('/admin/api/courses/'+id,{method:'DELETE'});
   await loadCourses();
 }
 document.querySelectorAll('input[name="dayMode"]').forEach(v=>v.addEventListener('change', toggleDayMode));
 toggleDayMode();
 loadCourses();
</script>
</body>
</html>
