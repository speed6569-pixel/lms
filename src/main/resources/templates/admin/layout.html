<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: '관리자'">관리자</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script defer th:src="@{/js/header-profile.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>

<main class="admin-wrap">
    <aside th:replace="~{admin/fragments/sidebar :: sidebar(${activeMenu})}"></aside>
    <section class="panel" th:replace="~{${content}}"></section>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
