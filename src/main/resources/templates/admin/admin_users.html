<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 사용자 관리</title>
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/header-profile.css}">
  <style>
    .wrap{max-width:1200px;margin:24px auto;padding:0 16px}.panel{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px} input,select{height:36px;border:1px solid #d1d5db;border-radius:8px;padding:0 10px}
    button{height:36px;border:0;border-radius:8px;background:#2563eb;color:#fff;padding:0 12px;cursor:pointer}
    table{width:100%;border-collapse:collapse} th,td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left;font-size:13px}
  </style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>
<main class="wrap">
  <section class="panel">
    <h2>사용자 관리</h2>
    <div class="row">
      <input id="q" placeholder="아이디(username) 또는 이름(name)" style="min-width:320px">
      <button onclick="loadUsers()">검색</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>username</th><th>name</th><th>email</th><th>role</th><th>status</th><th>생성일</th><th>변경</th></tr></thead>
      <tbody id="userBody"></tbody>
    </table>
  </section>
</main>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
<script>
 async function loadUsers(){
   const q = document.getElementById('q').value || '';
   const rows = await (await fetch('/admin/api/users?q='+encodeURIComponent(q))).json();
   const body = document.getElementById('userBody');
   body.innerHTML = rows.map(v => `
    <tr>
      <td>${v.id}</td>
      <td>${v.username||''}</td>
      <td>${v.name||''}</td>
      <td>${v.email||''}</td>
      <td>
        <select id='role-${v.id}'>
          <option value='ROLE_USER' ${v.role==='ROLE_USER'?'selected':''}>USER</option>
          <option value='ROLE_ADMIN' ${v.role==='ROLE_ADMIN'?'selected':''}>ADMIN</option>
        </select>
      </td>
      <td>
        <select id='status-${v.id}'>
          <option value='ACTIVE' ${v.status==='ACTIVE'?'selected':''}>ACTIVE</option>
          <option value='BLOCKED' ${v.status==='BLOCKED'?'selected':''}>BLOCKED</option>
        </select>
      </td>
      <td>${v.createdAt||''}</td>
      <td><button onclick='saveUser(${v.id})'>저장</button></td>
    </tr>
   `).join('');
 }
 async function saveUser(id){
   const role = document.getElementById('role-'+id).value;
   const status = document.getElementById('status-'+id).value;
   const res = await fetch('/admin/api/users/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({role,status})});
   const json = await res.json().catch(()=>({message:'저장 실패'}));
   if(!res.ok){ alert(json.message||'저장 실패'); return; }
   alert('저장되었습니다.');
   await loadUsers();
 }
 document.getElementById('q').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); loadUsers(); }});
 loadUsers();
</script>
</body>
</html>
