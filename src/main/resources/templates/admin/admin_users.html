<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
  <h2>사용자 관리</h2>
  <div class="row">
    <input id="q" placeholder="아이디(username) 또는 이름(name)" style="min-width:320px">
    <button class="action" onclick="loadUsers()">검색</button>
  </div>
  <table class="table">
    <thead><tr><th>ID</th><th>username</th><th>name</th><th>email</th><th>role</th><th>status</th><th>이용기간</th><th>총결제액</th><th>참여강의수</th><th>변경</th></tr></thead>
    <tbody id="userBody"></tbody>
  </table>

  <script>
   async function loadUsers(){
     const q = document.getElementById('q').value || '';
     const rows = await (await fetch('/admin/api/users?q='+encodeURIComponent(q))).json();
     const body = document.getElementById('userBody');
     if(!rows || rows.length===0){ body.innerHTML = `<tr><td colspan='10'>검색 결과가 없습니다.</td></tr>`; return; }
     body.innerHTML = rows.map(v => `<tr><td>${v.id}</td><td>${v.username||''}</td><td>${v.name||''}</td><td>${v.email||''}</td><td><select id='role-${v.id}'><option value='ROLE_USER' ${v.role==='ROLE_USER'?'selected':''}>USER</option><option value='ROLE_ADMIN' ${v.role==='ROLE_ADMIN'?'selected':''}>ADMIN</option></select></td><td><select id='status-${v.id}'><option value='ACTIVE' ${v.status==='ACTIVE'?'selected':''}>ACTIVE</option><option value='BLOCKED' ${v.status==='BLOCKED'?'selected':''}>BLOCKED</option></select></td><td>${v.usagePeriod||''}</td><td>${Number(v.totalPayment||0).toLocaleString()}원</td><td>${v.runningCourseCount||0}</td><td><button class='action' onclick='saveUser(${v.id})'>저장</button></td></tr>`).join('');
   }
   async function saveUser(id){
     const role = document.getElementById('role-'+id).value;
     const status = document.getElementById('status-'+id).value;
     const res = await fetch('/admin/api/users/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({role,status})});
     const json = await res.json().catch(()=>({message:'저장 실패'}));
     if(!res.ok){ alert(json.message||'저장 실패'); return; }
     alert('저장되었습니다.');
     await loadUsers();
   }
   document.getElementById('q').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); loadUsers(); }});
   loadUsers();
  </script>
</th:block>
</body>
</html>
