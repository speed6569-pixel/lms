<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
  <h2 th:text="${mode=='edit'} ? '게시물 수정' : '게시물 등록'"></h2>
  <form th:action="${mode=='edit'} ? @{'/admin/posts/' + ${post.id}} : @{/admin/posts}" method="post">
    <div class="row" style="display:grid;grid-template-columns:1fr;">
      <select name="category">
        <option value="SUPPORT" th:selected="${post != null and post.category=='SUPPORT'}">공지사항</option>
        <option value="CS" th:selected="${post != null and post.category=='CS'}">고객센터</option>
        <option value="SCHEDULE" th:selected="${post != null and post.category=='SCHEDULE'}">교육일정</option>
      </select>
      <input name="title" placeholder="제목" th:value="${post != null ? post.title : ''}">
      <textarea name="content" rows="12" placeholder="내용" th:text="${post != null ? post.content : ''}"></textarea>
      <select name="status">
        <option value="DRAFT" th:selected="${post != null and post.status=='DRAFT'}">DRAFT</option>
        <option value="PUBLISHED" th:selected="${post != null and post.status=='PUBLISHED'}">PUBLISHED</option>
        <option value="ARCHIVED" th:selected="${post != null and post.status=='ARCHIVED'}">ARCHIVED</option>
      </select>
      <label><input type="checkbox" name="pinned" th:checked="${post != null and post.pinned}"> 상단고정</label>
      <div class="row">
        <button type="submit" class="action">저장</button>
        <a href="/admin/posts" class="action gray">목록</a>
      </div>
    </div>
  </form>
</th:block>
</body>
</html>
