<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강신청</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
    <link rel="stylesheet" th:href="@{/css/header-profile.css}">
    <script defer th:src="@{/js/header-profile.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>



<main class="container content-wrap">
    <section class="tab-row">
        <button id="tabOpen" type="button" class="tab-btn active">개설과목 조회/신청</button>
        <button id="tabHistory" type="button" class="tab-btn">수강신청 내역</button>
        <button id="tabTime" type="button" class="tab-btn">시간표 조회</button>
    </section>

    <section id="openPanel">
        <form class="filter-grid" method="get" action="/enrollments/apply">
            <input id="quickCourseCode" type="text" placeholder="과목코드" style="max-width:140px;">
            <select name="job">
                <option value="">직군 전체</option>
                <option value="개발" th:selected="${job == '개발'}">개발</option>
                <option value="기획/마케팅" th:selected="${job == '기획/마케팅'}">기획/마케팅</option>
                <option value="경영" th:selected="${job == '경영'}">경영</option>
                <option value="영업" th:selected="${job == '영업'}">영업</option>
            </select>
            <select name="position">
                <option value="">직급 전체</option>
                <option value="사원" th:selected="${position == '사원'}">사원</option>
                <option value="주임" th:selected="${position == '주임'}">주임</option>
                <option value="대리" th:selected="${position == '대리'}">대리</option>
                <option value="과장" th:selected="${position == '과장'}">과장</option>
                <option value="차장" th:selected="${position == '차장'}">차장</option>
                <option value="부장" th:selected="${position == '부장'}">부장</option>
            </select>
            <input type="text" name="keyword" placeholder="키워드 검색" th:value="${keyword}" style="min-width:180px;">
            <button type="button" id="searchBtn" class="btn-primary">검색</button>
            <button type="button" id="resetFilterBtn" class="btn-primary" style="background:#6b7280;">필터 초기화</button>
            <button type="button" class="btn-primary" onclick="submitApplyByInput()">신청</button>
        </form>

        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>신청</th><th>과목코드</th><th>직군</th><th>직급</th><th>교과목명</th><th>담당교수</th><th>강의시간</th><th>가격</th><th>인원제한</th><th>비고</th>
                </tr>
                </thead>
                <tbody id="courseTableBody">
                <tr th:each="course : ${courses}" class="course-row"
                    th:attr="data-code=${course.courseCode},data-job=${course.job},data-position=${course.position}">
                    <td>
                        <button type="button" class="apply-btn"
                                th:attr="data-code=${course.courseCode},data-section=${course.section},data-title=${course.title},data-course-id=${course.courseId}"
                                th:disabled="${!course.open or course.enrolledCount >= course.maxCount}"
                                th:data-full="${!course.open or course.enrolledCount >= course.maxCount}"
                                onclick="toggleApply(this)"
                                th:text="${!course.open} ? '모집마감' : (course.enrolledCount >= course.maxCount ? '신청불가' : '신청')">신청</button>
                    </td>
                    <td th:text="${course.courseCode}"></td>
                    <td th:text="${course.job}"></td>
                    <td th:text="${course.position}"></td>
                    <td th:text="${course.title}"></td>
                    <td th:text="${course.professor}"></td>
                    <td th:text="${course.classTime}"></td>
                    <td th:text="${course.price}"></td>
                    <td th:text="|${course.enrolledCount}/${course.maxCount}|"></td>
                    <td th:text="${course.note}"></td>
                </tr>
                <tr id="noResultRow" th:if="${#lists.isEmpty(courses)}"><td colspan="11">검색 결과가 없습니다.</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section id="historyPanel" style="display:none;">
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr><th>신청일</th><th>과목코드</th><th>교과목명</th><th>상태</th><th>관리</th></tr></thead>
                <tbody id="historyBody">
                <tr id="historyEmpty"><td colspan="5">수강신청 내역이 없습니다.</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section id="timePanel" style="display:none;">
        <div id="weeklyTimetable" class="weekly-wrap">
            <div class="weekly-head">
                <div>시간</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div>
            </div>
            <div class="weekly-body" id="weeklyBody"></div>
            <div id="weeklyEvents" class="weekly-events"></div>
        </div>
    </section>
</main>

<script>
    const tabOpen = document.getElementById('tabOpen');
    const tabHistory = document.getElementById('tabHistory');
    const tabTime = document.getElementById('tabTime');
    const openPanel = document.getElementById('openPanel');
    const historyPanel = document.getElementById('historyPanel');
    const timePanel = document.getElementById('timePanel');

    const historyBody = document.getElementById('historyBody');
    const historyEmpty = document.getElementById('historyEmpty');
    const weeklyBody = document.getElementById('weeklyBody');
    const weeklyEvents = document.getElementById('weeklyEvents');
    const filterForm = document.querySelector('#openPanel form.filter-grid');
    const enrolledMap = new Map();
    const courseRows = Array.from(document.querySelectorAll('#courseTableBody .course-row'));
    const noResultRow = document.getElementById('noResultRow');
    const searchBtn = document.getElementById('searchBtn');
    const resetFilterBtn = document.getElementById('resetFilterBtn');

    function applyCourseFilters() {
      const code = document.getElementById('quickCourseCode').value.trim().toLowerCase();
      const job = filterForm.querySelector('select[name="job"]').value.trim().toLowerCase();
      const position = filterForm.querySelector('select[name="position"]').value.trim().toLowerCase();
      const keyword = filterForm.querySelector('input[name="keyword"]').value.trim().toLowerCase();

      let visibleCount = 0;
      courseRows.forEach(row => {
        const rowCode = (row.dataset.code || '').toLowerCase();
        const rowJob = (row.dataset.job || '').toLowerCase();
        const rowPosition = (row.dataset.position || '').toLowerCase();
        const rowText = row.textContent.toLowerCase();

        const match = (!code || rowCode.includes(code))
          && (!job || rowJob === job)
          && (!position || rowPosition === position)
          && (!keyword || rowText.includes(keyword));

        row.style.display = match ? '' : 'none';
        if (match) visibleCount++;
      });

      if (noResultRow) noResultRow.style.display = visibleCount === 0 ? '' : 'none';
    }

    function resetCourseFilters() {
      document.getElementById('quickCourseCode').value = '';
      filterForm.querySelector('select[name="job"]').value = '';
      filterForm.querySelector('select[name="position"]').value = '';
      filterForm.querySelector('input[name="keyword"]').value = '';
      applyCourseFilters();
    }

    function activate(tab) {
      [tabOpen, tabHistory, tabTime].forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    }

    tabOpen.addEventListener('click', () => {
      activate(tabOpen); openPanel.style.display=''; historyPanel.style.display='none'; timePanel.style.display='none';
    });
    tabHistory.addEventListener('click', () => {
      activate(tabHistory); openPanel.style.display='none'; historyPanel.style.display=''; timePanel.style.display='none';
    });
    tabTime.addEventListener('click', async () => {
      activate(tabTime); openPanel.style.display='none'; historyPanel.style.display='none'; timePanel.style.display='';
      await loadState();
      renderHistory();
      syncApplyButtons();
    });

    filterForm.addEventListener('submit', (e) => {
      e.preventDefault();
      applyCourseFilters();
    });
    searchBtn.addEventListener('click', applyCourseFilters);
    resetFilterBtn.addEventListener('click', resetCourseFilters);
    document.getElementById('quickCourseCode').addEventListener('input', applyCourseFilters);
    filterForm.querySelector('select[name="job"]').addEventListener('change', applyCourseFilters);
    filterForm.querySelector('select[name="position"]').addEventListener('change', applyCourseFilters);
    filterForm.querySelector('input[name="keyword"]').addEventListener('input', applyCourseFilters);

    function keyOf(code){ return `${code}`; }

    async function loadState(){
      const [historyRes, myRes] = await Promise.all([
        fetch('/api/me/enrollments/history'),
        fetch('/api/me/enrollments')
      ]);
      const historyItems = await historyRes.json();
      const myJson = await myRes.json();
      const myLectures = myJson.lectures || [];

      enrolledMap.clear();
      historyItems.forEach(v => enrolledMap.set(keyOf(v.courseCode), {
        enrollmentId: v.enrollmentId,
        code: v.courseCode,
        title: v.title,
        status: v.status,
        date: v.appliedAt || ''
      }));

      renderWeeklyGrid(myLectures);
    }

    function getCourseMeta(code, section) {
      const btn = document.querySelector(`button.apply-btn[data-code="${code}"][data-section="${section}"]`);
      if (!btn) return { title: code, professor: '-', classTime: '-' };
      const row = btn.closest('tr');
      const cells = row ? row.querySelectorAll('td') : [];
      return {
        title: cells[6]?.textContent?.trim() || btn.dataset.title || code,
        professor: cells[7]?.textContent?.trim() || '-',
        classTime: cells[8]?.textContent?.trim() || '-'
      };
    }

    function updateEmptyRow(){ historyEmpty.style.display = enrolledMap.size ? 'none' : ''; }
    function addHistoryRow(item){
      const tr = document.createElement('tr');
      tr.id = `history-${item.enrollmentId}`;
      tr.innerHTML = `<td>${item.date||''}</td><td>${item.code}</td><td>${item.title}</td><td>${item.status||''}</td>`+
                     `<td><button type="button" class="apply-btn" onclick="window.cancelFromHistory(${item.enrollmentId})">취소</button></td>`;
      historyBody.appendChild(tr);
    }
    function renderHistory(){
      historyBody.querySelectorAll('tr[id^="history-"]').forEach(x => x.remove());
      Array.from(enrolledMap.values()).forEach(addHistoryRow);
      updateEmptyRow();
    }

    function toMin(hm){ const [h,m] = hm.split(':').map(Number); return h*60+m; }

    function colorFor(title){
      let hash = 0;
      for (let i=0;i<title.length;i++) hash = (hash*31 + title.charCodeAt(i)) >>> 0;
      const hue = hash % 360;
      return `hsl(${hue} 75% 85%)`;
    }

    function renderWeeklyGrid(lectures){
      const days = ['월','화','수','목','금'];
      const startMin = 9*60, endMin = 22*60, step=30;
      const rows = (endMin-startMin)/step;

      weeklyBody.innerHTML = '';
      weeklyEvents.innerHTML = '';

      for(let r=0; r<rows; r++){
        const t = startMin + r*step;
        const th = document.createElement('div');
        th.className='t';
        th.textContent = t%60===0 ? `${String(Math.floor(t/60)).padStart(2,'0')}:00` : '';
        weeklyBody.appendChild(th);
        for(let d=0; d<5; d++){
          const c=document.createElement('div'); c.className='c'; weeklyBody.appendChild(c);
        }
      }

      const conflicts = new Set();
      const byDay = {월:[],화:[],수:[],목:[],금:[]};
      lectures.forEach((l,i)=>{ if(byDay[l.day]) byDay[l.day].push({...l,_i:i}); });
      for(const day of days){
        const arr = byDay[day].sort((a,b)=>toMin(a.startTime)-toMin(b.startTime));
        for(let i=0;i<arr.length;i++) for(let j=i+1;j<arr.length;j++){
          if(toMin(arr[j].startTime) < toMin(arr[i].endTime)) { conflicts.add(arr[i]._i); conflicts.add(arr[j]._i); }
        }
      }

      const dayWidth = weeklyEvents.clientWidth/5;
      const slotH = 24;
      lectures.forEach((l,i)=>{
        if(!days.includes(l.day)) return;
        const s=Math.max(toMin(l.startTime),startMin), e=Math.min(toMin(l.endTime),endMin);
        if(e<=s) return;
        const dayIdx=days.indexOf(l.day);
        const top=((s-startMin)/step)*slotH + 2;
        const height=((e-s)/step)*slotH - 4;

        const div=document.createElement('div');
        div.className='lecture-block'+(conflicts.has(i)?' conflict':'');
        div.style.left = `${dayIdx*dayWidth + 4}px`;
        div.style.top = `${top}px`;
        div.style.width = `${dayWidth - 8}px`;
        div.style.height = `${Math.max(height,24)}px`;
        div.style.background = colorFor(l.title || l.subject || '강의');
        div.innerHTML = `<strong>${l.title || l.subject}</strong><div>${l.room || '-'}</div><div>${l.startTime}~${l.endTime}</div>`;
        weeklyEvents.appendChild(div);
      });
    }

    function findApplyButton(code, section){
      return document.querySelector(`button.apply-btn[data-code="${code}"][data-section="${section}"]`);
    }

    function syncApplyButtons(){
      document.querySelectorAll('button.apply-btn[data-code]').forEach(btn => {
        if (btn.dataset.full === 'true') return;
        const key = keyOf(btn.dataset.code);
        btn.textContent = enrolledMap.has(key) ? '수강 취소' : '신청';
      });
    }

    window.toggleApply = async function(button){
      if (button.disabled || button.dataset.full === 'true') return;
      const code = button.dataset.code;
      const section = button.dataset.section;
      const key = keyOf(code);

      let res;
      if (!enrolledMap.has(key)) {
        const courseId = button.dataset.courseId;
        if (courseId) {
          res = await fetch(`/courses/${courseId}/enroll`, { method: 'POST' });
        } else {
          res = await fetch('/enroll/apply', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ courseCode: code, section }).toString()
          });
        }
      } else {
        const enrollmentId = enrolledMap.get(key)?.enrollmentId;
        res = await fetch(`/api/me/enrollments/${enrollmentId}/cancel`, { method: 'POST' });
      }
      const result = await res.json().catch(()=>({success:false,message:'신청 처리 중 오류가 발생했습니다.'}));
      alert(result.message || (result.success ? '처리 완료' : '처리 실패'));

      await loadState();
      renderHistory();
      syncApplyButtons();
    }

    window.cancelFromHistory = async function(enrollmentId){
      const res = await fetch(`/api/me/enrollments/${enrollmentId}/cancel`, { method: 'POST' });
      await res.json();

      await loadState();
      renderHistory();
      syncApplyButtons();
    }

    window.submitApplyByInput = function(){
      const courseCode = document.getElementById('quickCourseCode').value.trim();
      if (!courseCode) return;
      const btn = document.querySelector(`button.apply-btn[data-code="${courseCode}"]`);
      if (!btn) return;
      window.toggleApply(btn);
    }

    window.addEventListener('resize', () => {
      if (timePanel.style.display !== 'none') {
        loadState().then(() => {
          renderHistory();
          syncApplyButtons();
        });
      }
    });

    (async function init(){
      await loadState();
      renderHistory();
      syncApplyButtons();
      applyCourseFilters();
    })();
</script>
</body>
</html>
