<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강신청</title>
    <link rel="stylesheet" th:href="@{/css/page.css}">
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <h1 class="logo"><a href="/" style="text-decoration:none;color:inherit;">LMS</a></h1>
        <nav class="main-nav">
            <a href="/courses">과정안내</a><a href="/enrollments/apply">수강신청</a><a href="/enrollments/me">마이페이지</a><a href="/support">학습지원</a><a href="/customer-center">고객 센터</a><a href="/schedule">교육일정</a>
        </nav>
        <div class="top-auth"><a class="auth-link" href="/login">로그인</a><a class="auth-link auth-signup" href="/signup">회원가입</a></div>
    </div>
</header>

<main class="container content-wrap">
    <section class="tab-row">
        <button id="tabOpen" type="button" class="tab-btn active">개설과목 조회/신청</button>
        <button id="tabHistory" type="button" class="tab-btn">수강신청 내역</button>
        <button id="tabTime" type="button" class="tab-btn">시간표 조회</button>
    </section>

    <section id="openPanel">
        <form class="filter-grid" method="get" action="/enrollments/apply">
            <input id="quickCourseCode" name="courseCode" type="text" placeholder="과목코드" th:value="${courseCode}" style="max-width:120px;">
            <input id="quickSection" name="section" type="text" placeholder="분반" th:value="${section}" style="max-width:90px;">
            <select name="job">
                <option value="">직군 전체</option>
                <option value="개발" th:selected="${job == '개발'}">개발</option>
                <option value="기획/마케팅" th:selected="${job == '기획/마케팅'}">기획/마케팅</option>
                <option value="경영" th:selected="${job == '경영'}">경영</option>
                <option value="영업" th:selected="${job == '영업'}">영업</option>
            </select>
            <select name="position">
                <option value="">직급 전체</option>
                <option value="사원" th:selected="${position == '사원'}">사원</option>
                <option value="주임" th:selected="${position == '주임'}">주임</option>
                <option value="대리" th:selected="${position == '대리'}">대리</option>
                <option value="과장" th:selected="${position == '과장'}">과장</option>
                <option value="차장" th:selected="${position == '차장'}">차장</option>
                <option value="부장" th:selected="${position == '부장'}">부장</option>
            </select>
            <select name="dayNight">
                <option value="">주야 전체</option>
                <option value="주간" th:selected="${dayNight == '주간'}">주간</option>
                <option value="야간" th:selected="${dayNight == '야간'}">야간</option>
            </select>
            <input type="text" name="keyword" placeholder="키워드 검색" th:value="${keyword}" style="min-width:180px;">
            <button type="submit" class="btn-primary">검색</button>
            <button type="button" class="btn-primary" onclick="submitApplyByInput()">신청</button>
        </form>

        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>신청</th><th>주야</th><th>과목코드</th><th>분반</th><th>직군</th><th>직급</th><th>교과목명</th><th>담당교수</th><th>강의시간</th><th>가격</th><th>인원제한</th><th>비고</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="course : ${courses}">
                    <td>
                        <button type="button" class="apply-btn"
                                th:attr="data-code=${course.courseCode},data-section=${course.section},data-title=${course.title}"
                                th:disabled="${course.enrolledCount >= course.maxCount}"
                                th:data-full="${course.enrolledCount >= course.maxCount}"
                                onclick="toggleApply(this)"
                                th:text="${course.enrolledCount >= course.maxCount} ? '신청불가' : '신청'">신청</button>
                    </td>
                    <td th:text="${course.dayNight}"></td>
                    <td th:text="${course.courseCode}"></td>
                    <td th:text="${course.section}"></td>
                    <td th:text="${course.job}"></td>
                    <td th:text="${course.position}"></td>
                    <td th:text="${course.title}"></td>
                    <td th:text="${course.professor}"></td>
                    <td th:text="${course.classTime}"></td>
                    <td th:text="${course.price}"></td>
                    <td th:text="|${course.enrolledCount}/${course.maxCount}|"></td>
                    <td th:text="${course.note}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(courses)}"><td colspan="12">검색 결과가 없습니다.</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section id="historyPanel" style="display:none;">
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr><th>신청일</th><th>과목코드</th><th>교과목명</th><th>상태</th><th>관리</th></tr></thead>
                <tbody id="historyBody">
                <tr id="historyEmpty"><td colspan="5">수강신청 내역이 없습니다.</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section id="timePanel" style="display:none;">
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr><th>교과목명</th><th>교수</th><th>강의시간</th><th>상태</th></tr></thead>
                <tbody id="timeEnrolledBody">
                <tr id="timeEnrolledEmpty"><td colspan="4">수강신청된 강의가 없습니다.</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script>
    const tabOpen = document.getElementById('tabOpen');
    const tabHistory = document.getElementById('tabHistory');
    const tabTime = document.getElementById('tabTime');
    const openPanel = document.getElementById('openPanel');
    const historyPanel = document.getElementById('historyPanel');
    const timePanel = document.getElementById('timePanel');

    const historyBody = document.getElementById('historyBody');
    const historyEmpty = document.getElementById('historyEmpty');
    const timeEnrolledBody = document.getElementById('timeEnrolledBody');
    const timeEnrolledEmpty = document.getElementById('timeEnrolledEmpty');
    const filterForm = document.querySelector('#openPanel form.filter-grid');
    const enrolledMap = new Map();

    function activate(tab) {
      [tabOpen, tabHistory, tabTime].forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    }

    tabOpen.addEventListener('click', () => {
      activate(tabOpen); openPanel.style.display=''; historyPanel.style.display='none'; timePanel.style.display='none';
    });
    tabHistory.addEventListener('click', () => {
      activate(tabHistory); openPanel.style.display='none'; historyPanel.style.display=''; timePanel.style.display='none';
    });
    tabTime.addEventListener('click', () => {
      activate(tabTime); openPanel.style.display='none'; historyPanel.style.display='none'; timePanel.style.display='';
    });

    function keyOf(code, section){ return `${code}-${section}`; }

    async function loadState(){
      const res = await fetch('/enroll/list');
      const items = await res.json();
      enrolledMap.clear();
      items.forEach(v => enrolledMap.set(keyOf(v.courseCode, v.section), {
        code: v.courseCode,
        section: v.section,
        title: v.title,
        professor: v.professor,
        classTime: v.classTime,
        date: v.date
      }));
    }

    function getCourseMeta(code, section) {
      const btn = document.querySelector(`button.apply-btn[data-code="${code}"][data-section="${section}"]`);
      if (!btn) return { title: code, professor: '-', classTime: '-' };
      const row = btn.closest('tr');
      const cells = row ? row.querySelectorAll('td') : [];
      return {
        title: cells[6]?.textContent?.trim() || btn.dataset.title || code,
        professor: cells[7]?.textContent?.trim() || '-',
        classTime: cells[8]?.textContent?.trim() || '-'
      };
    }

    function updateEmptyRow(){ historyEmpty.style.display = enrolledMap.size ? 'none' : ''; }
    function addHistoryRow(item){
      const tr = document.createElement('tr');
      tr.id = `history-${keyOf(item.code,item.section)}`;
      tr.innerHTML = `<td>${item.date}</td><td>${item.code}</td><td>${item.title}</td><td>신청완료</td>`+
                     `<td><button type="button" class="apply-btn" onclick="window.cancelFromHistory('${item.code}','${item.section}')">수강 취소</button></td>`;
      historyBody.appendChild(tr);
    }
    function renderHistory(){
      historyBody.querySelectorAll('tr[id^="history-"]').forEach(x => x.remove());
      Array.from(enrolledMap.values()).forEach(addHistoryRow);
      updateEmptyRow();
    }

    function renderTimeEnrolledList(){
      timeEnrolledBody.querySelectorAll('tr[data-time-enrolled="true"]').forEach(x => x.remove());
      Array.from(enrolledMap.values()).forEach(item => {
        const meta = getCourseMeta(item.code, item.section);
        const title = item.title || meta.title;
        const professor = item.professor || meta.professor;
        const classTime = item.classTime || meta.classTime;
        const tr = document.createElement('tr');
        tr.setAttribute('data-time-enrolled', 'true');
        tr.innerHTML = `<td>${title}</td><td>${professor}</td><td>${classTime}</td><td>수강신청 완료</td>`;
        timeEnrolledBody.appendChild(tr);
      });
      timeEnrolledEmpty.style.display = enrolledMap.size ? 'none' : '';
    }

    function findApplyButton(code, section){
      return document.querySelector(`button.apply-btn[data-code="${code}"][data-section="${section}"]`);
    }

    function syncApplyButtons(){
      document.querySelectorAll('button.apply-btn[data-code]').forEach(btn => {
        if (btn.dataset.full === 'true') return;
        const key = keyOf(btn.dataset.code, btn.dataset.section);
        btn.textContent = enrolledMap.has(key) ? '수강 취소' : '신청';
      });
    }

    window.toggleApply = async function(button){
      if (button.disabled || button.dataset.full === 'true') return;
      const code = button.dataset.code;
      const section = button.dataset.section;
      const key = keyOf(code, section);

      let res;
      if (!enrolledMap.has(key)) {
        res = await fetch('/enroll/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ courseCode: code, section }).toString()
        });
      } else {
        res = await fetch('/enroll/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ courseCode: code, section }).toString()
        });
      }
      const result = await res.json();
      alert(result.message || '처리되었습니다.');

      await loadState();
      renderHistory();
      renderTimeEnrolledList();
      syncApplyButtons();
    }

    window.cancelFromHistory = async function(code, section){
      const res = await fetch('/enroll/cancel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ courseCode: code, section }).toString()
      });
      const result = await res.json();
      alert(result.message || '수강이 취소되었습니다');

      await loadState();
      renderHistory();
      renderTimeEnrolledList();
      syncApplyButtons();
    }

    window.submitApplyByInput = function(){
      const courseCode = document.getElementById('quickCourseCode').value.trim();
      const section = document.getElementById('quickSection').value.trim();
      const job = filterForm.querySelector('select[name="job"]').value.trim();
      const position = filterForm.querySelector('select[name="position"]').value.trim();
      const dayNight = filterForm.querySelector('select[name="dayNight"]').value.trim();
      const keyword = filterForm.querySelector('input[name="keyword"]').value.trim();

      if (!courseCode && !section && !job && !position && !dayNight && !keyword) {
        return alert('정보를 입력하세요');
      }

      if (!courseCode || !section) return alert('과목코드와 분반을 입력하세요.');
      const btn = findApplyButton(courseCode, section);
      if (!btn) return alert('해당 과목코드/분반 강의를 찾을 수 없습니다.');
      window.toggleApply(btn);
    }

    filterForm.addEventListener('submit', (e) => {
      const courseCode = document.getElementById('quickCourseCode').value.trim();
      const job = filterForm.querySelector('select[name="job"]').value.trim();
      const position = filterForm.querySelector('select[name="position"]').value.trim();
      const dayNight = filterForm.querySelector('select[name="dayNight"]').value.trim();
      const keyword = filterForm.querySelector('input[name="keyword"]').value.trim();

      if (!courseCode && !job && !position && !dayNight && !keyword) {
        e.preventDefault();
        alert('정보를 입력하세요');
      }
    });

    (async function init(){
      await loadState();
      renderHistory();
      renderTimeEnrolledList();
      syncApplyButtons();
    })();
</script>
</body>
</html>
