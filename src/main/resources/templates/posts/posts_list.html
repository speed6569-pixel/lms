<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title}">게시물</title>
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/header-profile.css}">
  <script defer th:src="@{/js/header-profile.js}"></script>
  <style>
    .wrap{max-width:1000px;margin:24px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px}
    .post-link{text-decoration:none;color:#111827;display:flex;justify-content:space-between;gap:12px;align-items:center}
    .post-date{font-size:12px;color:#6b7280;white-space:nowrap}
  </style>
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader(${userName}, ${userEmail})}"></div>
<main class="wrap">
  <h2 th:text="${title}"></h2>
  <div th:if="${#lists.isEmpty(posts)}" class="card">등록된 게시물이 없습니다.</div>
  <article class="card" th:each="p:${posts}">
    <a class="post-link" th:href="|${detailBasePath != null ? detailBasePath : '/posts'}/${p.id}|">
      <span th:text="${p.title}"></span>
      <span class="post-date" th:text="${p.createdAt != null ? #temporals.format(p.createdAt, 'yyyy-MM-dd') : ''}"></span>
    </a>
  </article>
</main>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
