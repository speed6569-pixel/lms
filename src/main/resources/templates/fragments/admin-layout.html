<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="side" th:fragment="adminSidebar(activeMenu)">
    <h3>관리 메뉴</h3>

    <th:block th:if="${activeMenu == 'dashboard'}">
        <button class="nav-btn active" data-target="stats" type="button">통계(대시보드)</button>
        <button class="nav-btn" data-target="courses" type="button">강의 관리</button>
        <a class="nav-btn" href="/admin/courses/manage">강의 콘텐츠 관리</a>
        <button class="nav-btn" data-target="enrollments" type="button">수강신청 관리</button>
        <a class="nav-btn" href="/admin/payments">결제 내역 관리</a>
        <button class="nav-btn" data-target="users" type="button">사용자 관리</button>
        <a class="nav-btn" href="/admin/posts">게시물 관리</a>
    </th:block>

    <th:block th:if="${activeMenu != 'dashboard'}">
        <a class="nav-btn" href="/admin/dashboard">통계(대시보드)</a>
        <a class="nav-btn" href="/admin/dashboard#courses">강의 관리</a>
        <a class="nav-btn" href="/admin/courses/manage">강의 콘텐츠 관리</a>
        <a class="nav-btn" href="/admin/dashboard#enrollments">수강신청 관리</a>
        <a class="nav-btn" href="/admin/payments">결제 내역 관리</a>
        <a class="nav-btn" href="/admin/dashboard#users">사용자 관리</a>
        <a class="nav-btn" th:classappend="${activeMenu == 'posts'} ? ' active' : ''" href="/admin/posts">게시물 관리</a>
    </th:block>
</aside>
</body>
</html>
