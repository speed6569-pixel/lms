<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container">
    <main class="login-card" aria-labelledby="login-title">
        <h1 id="login-title" class="login-title">로그인</h1>

        <p class="login-helper">
            계정이 없으신가요?
            <a href="/signup" class="helper-link">회원가입</a>
        </p>

        <div class="login-messages" aria-live="polite">
            <p class="msg msg-success" th:if="${message}" th:text="${message}"></p>
            <p class="msg msg-error" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</p>
            <p class="msg msg-success" th:if="${param.logout}">로그아웃 되었습니다.</p>
        </div>

        <form method="post" action="/login" class="login-form">
            <div class="form-group">
                <label for="loginId">아이디</label>
                <input id="loginId" name="loginId" type="text" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" required autocomplete="current-password">
            </div>

            <div class="form-options">
                <label class="remember-row">
                    <input type="checkbox" name="remember-me">
                    <span>로그인 상태 유지(14일)</span>
                </label>
            </div>

            <button type="submit" class="btn-login">로그인</button>
        </form>

        <section class="sso-section" aria-labelledby="sso-title">
            <h2 id="sso-title">조직 SSO 로그인</h2>
            <div class="sso-buttons">
                <a href="/oauth2/authorization/entra" class="sso-button">Entra ID</a>
                <a href="/oauth2/authorization/google" class="sso-button">Google</a>
                <a href="/oauth2/authorization/okta" class="sso-button">Okta</a>
            </div>
        </section>

        <nav class="login-links" aria-label="로그인 관련 링크">
            <a href="/find-id">아이디 찾기</a>
            <span class="divider" aria-hidden="true">|</span>
            <a href="/forgot-password">비밀번호 찾기</a>
            <span class="divider" aria-hidden="true">|</span>
            <a href="/signup">회원가입</a>
        </nav>

        <p class="home-link-wrap">
            <a href="/" class="home-link">홈으로</a>
        </p>
    </main>
</div>
</body>
</html>
