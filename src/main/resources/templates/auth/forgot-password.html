<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기</title>
</head>
<body>
<h1>비밀번호 재설정</h1>
<p th:if="${message}" th:text="${message}" style="color: green;"></p>

<form method="post" action="/forgot-password">
    <div>
        <label for="loginIdOrEmail">아이디 또는 이메일</label>
        <input id="loginIdOrEmail" name="loginIdOrEmail" type="text" required>
    </div>
    <button type="submit">재설정 링크 보내기</button>
</form>

<p><a href="/login">로그인으로 돌아가기</a></p>
</body>
</html>
